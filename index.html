 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos | Keyingi Manzil Mars</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">COSMOS<span>.io</span></div>
        <nav aria-label="Asosiy menyu">
            <ul>
                <li><a href="#home">Bosh sahifa</a></li>
                <li><a href="#planets">Planetalar</a></li>
                <li><a href="#booking">Chiptalar</a></li>
            </ul>
        </nav>
        <button class="btn-primary">Sayohatni boshlash</button>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1 class="glitch" data-text="Koinotni Kashf Et">Koinotni Kashf Et</h1>
                <p>Insoniyatning yangi davri boshlanmoqda. Biz bilan yulduzlararo sayohat qiling.</p>
                <div class="stats">
                    <div class="stat-item"><strong>4.8k</strong><span>Sayohatlar</span></div>
                    <div class="stat-item"><strong>12</strong><span>Manzillar</span></div>
                </div>
            </div>
            <div class="planet-container">
                <div class="mars"></div>
            </div>
        </section>

        <section id="planets" class="grid-section">
            <h2 class="section-title">Ommabop Manzillar</h2>
            <div class="cards-wrapper">
                <article class="planet-card">
                    <img src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?auto=format&fit=crop&w=400" alt="Mars">
                    <div class="card-overlay">
                        <h3>Mars - Qizil Dunyo</h3>
                        <p>$250,000 dan boshlanadi</p>
                        <button class="book-btn">Band qilish</button>
                    </div>
                </article>
                </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
